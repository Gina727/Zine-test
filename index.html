<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramblers' Digital Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
</head>
<body>

    <div id="shelf-view" class="view">
        <h1 class="library-title">Ramblers' Digital Library</h1>
        
        <div class="library-container">
            <div class="shelf-grid">
                
                <div class="book-item" data-pdf="books/book1.pdf">
                    <div class="book-flat">
                        <img class="book-cover" src="covers/1.png" alt="Why You Should Hike">
                    </div>
                    <div class="shelf-book-title">Why You Should Hike</div>
                </div>

                <div class="book-item" data-pdf="books/book2.pdf">
                    <div class="book-flat">
                        <img class="book-cover" src="covers/2.png" alt="Leave No Trace">
                    </div>
                    <div class="shelf-book-title">Leave No Trace</div>
                </div>

                <div class="book-item" data-pdf="books/book3.pdf">
                    <div class="book-flat">
                        <img class="book-cover" src="covers/3.png" alt="Ramble Without A Goal">
                    </div>
                    <div class="shelf-book-title">Ramble Without A Goal</div>
                </div>

                <div class="book-item" data-pdf="books/book4.pdf">
                    <div class="book-flat">
                        <img class="book-cover" src="covers/4.png" alt="Book4">
                    </div>
                    <div class="shelf-book-title">Book4</div>
                </div> 

            </div>
        </div>

        <br>

        <div class="gallery-conveyor-container">
            <div class="gallery-track">
                <img src="gallery/photo1.jpg" alt="Gallery Photo 1">
                <img src="gallery/photo2.jpg" alt="Gallery Photo 2">
                <img src="gallery/photo3.jpg" alt="Gallery Photo 3">
                <img src="gallery/photo4.jpg" alt="Gallery Photo 4">
                <img src="gallery/photo5.jpg" alt="Gallery Photo 5">
                <img src="gallery/photo6.jpg" alt="Gallery Photo 6">
                <img src="gallery/photo7.jpg" alt="Gallery Photo 7">
                <img src="gallery/photo8.jpg" alt="Gallery Photo 8">
                <img src="gallery/photo9.jpg" alt="Gallery Photo 9">
                <img src="gallery/photo10.jpg" alt="Gallery Photo 10">
                <img src="gallery/photo11.jpg" alt="Gallery Photo 11">
                <img src="gallery/photo12.jpg" alt="Gallery Photo 12">

                <img src="gallery/photo1.jpg" alt="Gallery Photo 1">
                <img src="gallery/photo2.jpg" alt="Gallery Photo 2">
                <img src="gallery/photo3.jpg" alt="Gallery Photo 3">
                <img src="gallery/photo4.jpg" alt="Gallery Photo 4">
                <img src="gallery/photo5.jpg" alt="Gallery Photo 5">
                <img src="gallery/photo6.jpg" alt="Gallery Photo 6">
                <img src="gallery/photo7.jpg" alt="Gallery Photo 7">
                <img src="gallery/photo8.jpg" alt="Gallery Photo 8">
                <img src="gallery/photo9.jpg" alt="Gallery Photo 9">
                <img src="gallery/photo10.jpg" alt="Gallery Photo 10">
                <img src="gallery/photo11.jpg" alt="Gallery Photo 11">
                <img src="gallery/photo12.jpg" alt="Gallery Photo 12">
            </div>
        </div>
        

        <footer class="shelf-footer">
            <a href="https://www.instagram.com/hku_ramblers/" target="_blank" rel="noopener noreferrer">
                @hku_ramblers
            </a>
        </footer>
    </div>

    <div id="reader-view" class="view hidden">
        <button id="back-button">← Back to Shelf</button>
        <div class="book-container">
            <div id="loading">Loading book pages...</div>
            <div id="book" class="hidden"></div>
        </div>
    </div>

    <div id="gallery-lightbox" class="lightbox-hidden">
        <img id="lightbox-img" src="" alt="Zoomed Gallery View">
    </div>
    <script src="app.js"></script>
</body>
</html>
