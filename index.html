<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Bookshelf</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
</head>
<body>

    <div id="shelf-view" class="view">
        <!-- Updated Title -->
        <h1 class="library-title">Ramblers' Digital Library</h1>
        
        <div class="library-container">
            <!-- Two-column grid system -->
            <div class="shelf-grid">
                
                <!-- Book 1 -->
                <div class="book-item" data-pdf="books/book1.pdf">
                    <div class="book-3d">
                        <img class="book-cover" src="covers/1.png" alt="Design Patterns Cover">
                        <div class="book-spine-side color-1"></div>
                    </div>
                    <center><p><span style="color: white;">Why You Should Hike</span></p></center>
                </div>

                <!-- Book 2 -->
                <div class="book-item" data-pdf="books/book2.pdf">
                    <div class="book-3d">
                        <img class="book-cover" src="covers/2.png" alt="JS Guide Cover">
                        <div class="book-spine-side color-2"></div>
                    </div>
                    <center><p><span style="color: white;">Leave No Trace</span></p></center>
                </div>

                <!-- Book 3 -->
                <div class="book-item" data-pdf="books/book3.pdf">
                    <div class="book-3d">
                        <img class="book-cover" src="covers/3.png" alt="CSS Mastery Cover">
                        <div class="book-spine-side color-3"></div>
                    </div>
                    <center><p><span style="color: white;">Rambler Without A Goal</span></p></center>
                </div>

                <div class="book-item" data-pdf="books/book4.pdf">
                    <div class="book-3d">
                        <img class="book-cover" src="covers/4.png" alt="Next.js Cover">
                        <div class="book-spine-side color-1"></div>
                    </div>
                    <center><p><span style="color: white;">Book4</span></p></center>
                </div> 

            </div>
        </div>
        <footer class="shelf-footer">
            <a href="https://www.instagram.com/hku_ramblers/" target="_blank" rel="noopener noreferrer">
                @hku_ramblers
            </a>
        </footer>
    </div>

    <div id="reader-view" class="view hidden">
        <button id="back-button">← Back to Shelf</button>
        <div class="book-container">
            <div id="loading">Loading book pages...</div>
            <div id="book" class="hidden"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
